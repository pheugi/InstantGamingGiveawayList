name: Generate Optimized README

on:
  workflow_dispatch:
  push:
    paths:
      - json.json
      - misc/generateReadme.sh
      - .github/workflows/generateReadme.yml

permissions:
  contents: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make generator executable
        run: chmod +x misc/generateReadme.sh

      - name: Generate image-free README
        run: ./misc/generateReadme.sh

      - name: Commit updated readme
        run: |
          if [[ -z "$(git status --porcelain readme.md)" ]]; then
            echo "No readme.md changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add readme.md
          git commit -m "chore: regenerate optimized readme [skip ci]"
          git push
